# Key Configuration
# Edit this file before running ./scripts/generate_keys.sh
# Each line: SEINFO|CN|ORG|COUNTRY
# The CN must be UNIQUE per seinfo type or Android rejects all policies

# APK Signing Keys (EC P-256)
platform|mykey-platform|MyOrg|US
media|mykey-media|MyOrg|US
verizon|mykey-verizon|MyOrg|US
shared|mykey-shared|MyOrg|US
releasekey|mykey-releasekey|MyOrg|US
networkstack|mykey-networkstack|MyOrg|US
ssgapp|mykey-ssgapp|MyOrg|US
sysmonapp|mykey-sysmonapp|MyOrg|US

# OTA Signing Key (RSA 2048)
ota|mykey-ota|MyOrg|US

# Keystore password (also settable via KEY_PASS env var)
KEY_PASS=changeit

# Validity in days
VALIDITY_DAYS=10000
